<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pinázios</title>
    <link rel="icon" href="imagens/logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/preview.css">
    <link rel="stylesheet" href="styles/print.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="module" src="js/main.js"></script>
</head>

<body>

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="topbar-brand">
            <img src="imagens/logo.png" alt="Logo" onerror="this.style.display='none'">
            <h1>Calculadora de Pinázios</h1>
        </div>
        <div class="topbar-pedido">
            <label for="pedidoNumero">Nº Pedido:</label>
            <input type="number" id="pedidoNumero" min="0" inputmode="numeric">
        </div>
    </header>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div>
                <div class="section-title">Tipo de Pinázio</div>
                <div class="form-card">
                    <div class="form-group">
                        <label for="tipoCalculadora">Tipo</label>
                        <select id="tipoCalculadora"></select>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">Dados da Peça</div>
                <div class="form-card">
                    <div class="field-grid">
                        <div class="form-group">
                            <label for="ambienteNome">Ambiente</label>
                            <input type="text" id="ambienteNome">
                        </div>
                        <div class="form-group">
                            <label for="quantidade">Quantidade</label>
                            <input type="number" id="quantidade" min="1">
                        </div>
                        <div class="form-group">
                            <label for="largura">Largura</label>
                            <input type="number" id="largura" min="1">
                        </div>
                        <div class="form-group">
                            <label for="altura">Altura</label>
                            <input type="number" id="altura" min="1">
                        </div>
                        <div class="form-group">
                            <label for="vaosHorizontais">Div. Horizontais</label>
                            <input type="number" id="vaosHorizontais" value="2" min="1">
                        </div>
                        <div class="form-group">
                            <label for="vaosVerticais">Div. Verticais</label>
                            <input type="number" id="vaosVerticais" value="2" min="1">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">Cores</div>
                <div class="form-card">
                    <div class="field-grid">
                        <div class="form-group">
                            <label for="corCamara">Câmara</label>
                            <select id="corCamara">
                                <option value="PRATA" selected>PRATA</option>
                                <option value="PRETO">PRETO</option>
                                <option value="BRANCO">BRANCO</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="corPinazio">Pinázio</label>
                            <select id="corPinazio">
                                <option value="BRANCO" selected>BRANCO</option>
                                <option value="PRETO">PRETO</option>
                            </select>
                        </div>
                        <div class="form-group full">
                            <label for="obsTexto">OBS</label>
                            <input type="text" id="obsTexto">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <label class="checkbox-row" for="specifySegments">
                    <input type="checkbox" id="specifySegments">
                    <span>Especificar divisões individualmente</span>
                </label>
            </div>

            <div id="segmentInputContainer">
                <h3>Tamanhos Específicos (mm)</h3>
                <p class="segment-input-warning" id="segmentInputWarning"></p>
            </div>

            <button id="calculateButton" class="btn btn-primary btn-full" style="margin-top:auto;">
                 Calcular
            </button>

        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">

            <!-- Preview + Results (hidden until calculated) -->
            <div id="captureContainer">

                <!-- Preview -->
                <div class="preview-card">
                    <div id="previewTitleAmbiente"></div>
                    <div class="preview-row">
                        <div class="preview">
                            <div class="peca" id="preview-peca"></div>
                        </div>
                        <div id="furosDiagramContainer"></div>
                    </div>
                    <div id="previewCoresInfo"></div>
                    <div style="display:flex; justify-content:center; margin-top:12px;">
                        <button id="downloadImageButton" class="btn btn-success" style="display:none;">
                            ↓ Download Imagem
                        </button>
                    </div>
                </div>

                <!-- Results -->
                <div class="results-card">
                    <h2>Resultados</h2>
                    <div id="resultadoQuantidade"></div>
                    <div id="resultado" class="resultado">
                        <p style="color:var(--text-muted);">Preencha os dados e calcule.</p>
                    </div>
                    <div style="margin-top:auto; padding-top:0.75rem; border-top:1px solid var(--border-color);">
                        <button id="addPieceButton" class="btn btn-action btn-full">
                            + Adicionar ao Pedido
                        </button>
                    </div>
                </div>

            </div>

            <!-- Pedido -->
            <div class="pedido-section">
                <div class="pedido-header-row">
                    <h3 id="pedidoHeader">
                        Pedido: <span id="pedidoNumeroDisplay">N/A</span>
                        (<span id="pedidoTotalPecas">0</span> peças)
                    </h3>
                    <button id="downloadPdfButton" class="btn btn-indigo">
                        ↓ Download PDF
                    </button>
                </div>
                <div id="pedidoPecasListContainer">
                    <div id="pedidoPecasList" class="pedido-pecas-list">
                        <div class="empty-state">Nenhuma peça adicionada ainda.</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>

</html>
